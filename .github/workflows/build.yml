name: Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  Build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Get Plugin Version
        run: |
          [xml]$project = Get-Content -Raw -Encoding UTF8 BossMod\BossModReborn.csproj
          $version = $project.SelectSingleNode('//Version').InnerText
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Version not found in BossMod\BossModReborn.csproj'
          }
          "plugin_version=$version" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV

      - name: Download Dalamud Latest
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncherCN\addon\Hooks\dev"

      - name: Restore NuGet Packages
        run: dotnet restore     BossMod/BossModReborn.csproj

      - name: Build Plugin
        run: dotnet build --no-restore -c Release BossMod/BossModReborn.csproj --output .\build\

      - name: Cleanup Build Output
        run: Get-ChildItem .\build\* -Exclude BossModReborn.*,DefaultRotationPresets.json,PInvoke.User32.dll | Remove-Item -Force -Recurse

      - name: Zip Plugin
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts
          Compress-Archive -Path .\build\* -DestinationPath ".\artifacts\BossModReborn-${{ env.plugin_version }}.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossModReborn-${{ env.plugin_version }}-${{ github.run_number }}-${{ github.sha }}
          path: .\artifacts\BossModReborn-${{ env.plugin_version }}.zip
          if-no-files-found: error

      - name: Update Version Release Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git tag -f $env:plugin_version ${{ github.sha }}
          git push origin $env:plugin_version --force

      - name: Publish Version Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.plugin_version }}
          name: ${{ env.plugin_version }}
          body: Automated build from the main branch for BossModReborn ${{ env.plugin_version }}.
          files: ./artifacts/BossModReborn-${{ env.plugin_version }}.zip
          prerelease: false
          make_latest: true
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout DalamudPlugins
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          repository: 44451516-ff14/DalamudPlugins
          ref: master
          path: DalamudPlugins
          token: ${{ secrets.DALAMUD_PLUGINS_TOKEN }}

      - name: Sync DalamudPlugins Release Asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: DalamudPlugins
        env:
          GITHUB_TOKEN: ${{ secrets.DALAMUD_PLUGINS_TOKEN }}
        run: python sync_release_plugins.py

      - name: Commit DalamudPlugins Sync
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: DalamudPlugins
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/BossModReborn/latest.zip
          if (git diff --cached --quiet) {
            Write-Host "No DalamudPlugins changes to commit."
            exit 0
          }
          git commit -m "Sync BossModReborn $env:plugin_version"
          git push
